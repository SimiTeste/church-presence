<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar Membro' if member else 'Novo Membro' }} - Ad Brás Jardim Califórnia</title>
    <!-- Bootstrap CSS v5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
        }

        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: #0f172a !important;
            font-size: 18px;
        }

        .card-custom {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 32px;
            margin-bottom: 24px;
        }

        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 20px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-dark-custom {
            background-color: #0f172a;
            color: #ffffff;
            border: none;
        }

        .btn-dark-custom:hover {
            background-color: #1e293b;
            color: #ffffff;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
            font-size: 14px;
            color: #1e293b;
        }

        .form-control:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }

        .page-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 22px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">
                <i class="bi bi-building me-2"></i>Ad Brás - Jardim Califórnia
            </a>
            <div class="d-flex align-items: center;">
                <a href="{{ url_for('members.index') }}" class="btn btn-outline-secondary btn-sm btn-custom me-2">
                    <i class="bi bi-arrow-left me-1"></i> Voltar
                </a>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm btn-custom">
                    <i class="bi bi-box-arrow-right me-1"></i> Sair
                </a>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container my-4" style="max-width: 700px;">
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h1 class="page-title">
            <i class="bi {{ 'bi-pencil-square' if member else 'bi-person-plus' }} me-2"></i>
            {{ 'Editar Cadastro de Membro' if member else 'Cadastrar Novo Membro' }}
        </h1>

        <!-- Formulário -->
        <div class="card-custom">
            <form method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ member.nome if member else '' }}" required placeholder="Digite o nome completo">
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label">CPF / Documento</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" value="{{ member.cpf if member else '' }}" required placeholder="Apenas números ou formatado">
                </div>

                <div class="mb-4">
                    <label for="telefone" class="form-label">Telefone / WhatsApp</label>
                    <input type="text" class="form-control" id="telefone" name="telefone" value="{{ member.telefone if member else '' }}" placeholder="(00) 00000-0000">
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('members.index') }}" class="btn btn-outline-secondary btn-custom">Cancelar</a>
                    <button type="submit" class="btn btn-dark-custom btn-custom">
                        <i class="bi bi-check-lg me-1"></i> Salvar Membro
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
