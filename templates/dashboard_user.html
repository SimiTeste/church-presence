<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel - Ad Brás Jardim Califórnia</title>
    <!-- Bootstrap CSS v5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
        }

        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: #0f172a !important;
            font-size: 18px;
        }

        .card-custom {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-bottom: 24px;
        }

        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 16px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 22px;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-building me-2"></i>Ad Brás - Jardim Califórnia
            </a>
            <div class="d-flex align-items-center">
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm btn-custom">
                    <i class="bi bi-box-arrow-right me-1"></i> Sair
                </a>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal do Membro -->
    <div class="container my-4">
        
        <!-- Cabeçalho -->
        <div class="page-header">
            <h1 class="page-title"><i class="bi bi-house-door me-2"></i>Bem-vindo ao seu Painel</h1>
            <p class="text-muted mt-1" style="font-size: 14px;">Acompanhe sua jornada e frequências por aqui.</p>
        </div>

        <!-- Card de Frase Motivacional Diária -->
        <div class="card-custom mb-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #ffffff;">
            <div class="d-flex align-items-center">
                <div class="flex-shrink-0 me-3 text-warning fs-3">
                    <i class="bi bi-lightbulb-fill"></i>
                </div>
                <div>
                    <h6 class="text-uppercase text-muted fw-bold mb-1" style="font-size: 11px; letter-spacing: 0.5px; color: #94a3b8 !important;">
                        Inspiração do Dia
                    </h6>
                    <p class="mb-0 fw-medium" style="font-size: 15px; color: #f8fafc;">
                        "{{ frase_motivacional }}"
                    </p>
                </div>
            </div>
        </div>

        <!-- Outros resumos do membro (exemplo de espaço para estatísticas pessoais) -->
        <div class="row">
            <div class="col-md-6">
                <div class="card-custom">
                    <h5 class="fw-bold mb-3 text-dark" style="font-size: 16px;"><i class="bi bi-calendar-check me-2 text-success"></i>Sua Frequência</h5>
                    <p class="text-muted" style="font-size: 14px;">Continue participando das aulas e cultos para manter seu histórico sempre atualizado.</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
