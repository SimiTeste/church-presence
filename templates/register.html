<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Usuário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5" style="max-width: 500px;">
        <h2 class="mb-4">Cadastrar Usuário</h2>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" name="nome" class="form-control" placeholder="Ex: João Silva" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">E-mail (opcional)</label>
                <input type="email" name="email" class="form-control" placeholder="usuario@email.com">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Tipo de Conta</label>
                <select name="tipo" class="form-select">
                    <option value="USER">Usuário Padrão</option>
                    <option value="MASTER">Administrador Master</option>
                </select>
            </div>

            <div class="alert alert-info py-2" role="alert">
                <small>ℹ️ A senha inicial do usuário será criada automaticamente como os <strong>6 primeiros dígitos do CPF</strong>.</small>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-2">Cadastrar Usuário</button>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary w-100">Voltar ao Dashboard</a>
        </form>
    </div>
</body>
</html>
